general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.04
    brightness = 0.65
    contrast = 1.0
    vibrancy = 0.15
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(2abcbc)
    inner_color = rgb(080c16)
    font_color = rgb(c0d8e8)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 10
    check_color = rgb(2abcbc)
    fail_color = rgb(e06060)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(192, 216, 232, 1.0)
    font_size = 72
    font_family = Monospace
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(122, 172, 190, 1.0)
    font_size = 20
    font_family = Monospace
    position = 0, 80
    halign = center
    valign = center
}
