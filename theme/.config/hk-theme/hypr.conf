# ~/.config/hk-theme/hypr.conf
# Theme-only knobs: colors, wallpaper, tiny styling bits.

# (Optional) common color variables for later use
$HK_ACCENT = rgba(89b4faee)
$HK_BG     = rgba(11111bee)
$HK_FG     = rgba(cdd6f4ff)

# Wallpaper (keep this aligned with whatever file you actually use)
$HK_WALLPAPER = ~/Pictures/wallpapers/mtdoom.jpg

# If you want Hyprland to start the wallpaper, you can exec-once here,
# but ONLY if you are not already doing it elsewhere.
# exec-once = swww init
# exec-once = swww img $HK_WALLPAPER

