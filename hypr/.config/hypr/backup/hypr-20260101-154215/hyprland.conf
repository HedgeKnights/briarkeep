# =========================
# Monitors
# =========================

# Primary monitor (ASUS, landscape)
monitor=DP-3,preferred@144,0x0,1

# Secondary monitor (MSI, portrait)
monitor=DP-1,preferred@60,1920x0,1,transform,1

#Wallpaper
#directs to hyprpaper
exec-once = hyprpaper -c ~/.config/hypr/hyprpaper.conf


# =========================
# Input
# =========================
input {
  kb_layout = us
  follow_mouse = 1
  sensitivity = 0
}

# =========================
# Variables

$mainMod = SUPER
$terminal = ghostty
$fileManager = thunar
$menu = wofi --show drun

# =========================
# Keybindings
# =========================
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, C, killactive
bind = $mainMod, s, exec, ~/.config/hypr/scripts/spotify-smart.sh
bind = $mainMod, g, exec, ~/.config/hypr/scripts/chatgpt-smart.sh


# Screenshots
bind = CTRL+SHIFT,S,exec,grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, S, exec, grim ~/Pictures/screenshot-$(date +%F-%T).png

# Focus movement
bind = $mainMod, left,  movefocus, h
bind = $mainMod, right, movefocus, l
bind = $mainMod, up,    movefocus, k
bind = $mainMod, down,  movefocus, j

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Super + drag move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# =========================
# Window rules
# =========================
windowrule = suppressevent maximize, class:.*
windowrule = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

#Spotify and Discord on Workspace 5 Discord later
# Pin workspace 5 to DP-1
workspace = 5, monitor:DP-1

# Send Spotify to workspace 5
windowrulev2 = workspace 5 silent, class:^(spotify)$

#Chat GPT Workspace 4
workspace = 4, monitor:DP-1

# If a Firefox window’s title contains ChatGPT/OpenAI, force it onto workspace 4
windowrulev2 = workspace 4 silent, class:^(firefox)$, title:.*(ChatGPT|OpenAI).*

