# --- Modular Theme Loading ---
# =========================
# Monitors
# =========================

# Primary monitor (ASUS, landscape)
monitor=DP-3,1920x1080@143.981,0x0,1

# Secondary monitor (MSI, portrait)
monitor=DP-1,preferred@60,1920x0,1,transform,1

# Thunar darkmode
env = GTK_THEME,Adwaita-dark

# =========================
# Autostart
# =========================

exec-once = /home/hedgeknight/.config/hypr/start_wallpaper.sh

# Waybar
exec-once = waybar
# 
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# =========================
# Variables
# =========================

$mainMod = SUPER
$terminal = ghostty
$fileManager = thunar
$menu = wofi --show drun


# =========================
# Input
# =========================
input {
  kb_layout = us
  follow_mouse = 1
  sensitivity = 0
}


# =========================
# Layout
# =========================
general {
  layout = master
}

master {
  new_status = slave
  new_on_top = 1
  mfact = 0.70
  orientation = top
}


# =========================
# Workspace -> Monitor pinning (canonical)
# =========================
# Main monitor canonical workspaces
workspace = 1, monitor:DP-3
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 6, monitor:DP-3

# Secondary monitor canonical workspaces
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1

# Note: 7/8/9/10 intentionally NOT pinned (your “anarchy” spaces)


# =========================
# Keybindings
# =========================

# Theme Switcher 
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/theme-switcher.sh 

# Launchers
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, O, exec, obsidian
# Actions
bind = $mainMod, C, killactive

# Smart app scripts
bind = $mainMod, S, exec, ~/.config/hypr/scripts/spotify-smart.sh
bind = $mainMod, G, exec, ~/.config/hypr/scripts/chatgpt-smart.sh

# Screenshots
bind = CTRL+SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, S, exec, grim ~/Pictures/screenshot-$(date +%F-%T).png

# Focus movement (vim keys)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Workspaces (1-9, 0->10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Super + drag move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# =========================
# Window rules (2026 Syntax)
# =========================

# General defaults
windowrule = match:class .*, suppress_event maximize
windowrule = match:class ^$, match:title ^$, match:xwayland 1, no_focus on

# --- Workspace 1: Ghostty (dev terminal)
windowrule = match:class ^(com\.mitchellh\.ghostty)$, workspace 1

# --- Workspace 5: Services
windowrule = match:class ^(spotify)$, workspace 5 silent

# --- Workspace 4: ChatGPT in Firefox
windowrule = match:class ^(firefox)$, match:title .*(ChatGPT|OpenAI).*, workspace 4 silent

# --- Steam client
windowrule = match:class ^(steam)$, workspace 5

# Steam games -> force to primary monitor (DP-3) and workspace 3
windowrule = monitor DP-3, match:class ^(steam_app_.*)$
windowrule = workspace 3, match:class ^(steam_app_.*)$

windowrule = match:class ^(feh)$, float on
windowrule = match:class ^(feh)$, size 800 600
windowrule = match:class ^(feh)$, move 100%-820 50

# Any Gamescope game goes to workspace 3
windowrule = workspace 3, match:class ^(gamescope)$

# Media keys / DOIO knob
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
