# =========================
# Monitors
# =========================

# Primary monitor (ASUS, landscape)
monitor=DP-3,preferred@144,0x0,1

# Secondary monitor (MSI, portrait)
monitor=DP-1,preferred@60,1920x0,1,transform,1

# Thunar darkmode
env = GTK_THEME,Adwaita-dark

# =========================
# Autostart
# =========================

exec-once = /home/hedgekinght/.config/hypr/start_wallpaper.sh

# Waybar
exec-once = waybar


# =========================
# Variables
# =========================

$mainMod = SUPER
$terminal = ghostty
$fileManager = thunar
$menu = wofi --show drun


# =========================
# Input
# =========================
input {
  kb_layout = us
  follow_mouse = 1
  sensitivity = 0
}


# =========================
# Layout
# =========================
general {
  layout = master
}

master {
  new_status = slave
  new_on_top = 1
  mfact = 0.70
  orientation = top
}


# =========================
# Workspace -> Monitor pinning (canonical)
# =========================
# Main monitor canonical workspaces
workspace = 1, monitor:DP-3
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 6, monitor:DP-3

# Secondary monitor canonical workspaces
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1

# Note: 7/8/9/10 intentionally NOT pinned (your “anarchy” spaces)


# =========================
# Keybindings
# =========================

# Launchers
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod SHIFT, R, exec, hyprctl reload

# Actions
bind = $mainMod, C, killactive

# Smart app scripts
bind = $mainMod, S, exec, ~/.config/hypr/scripts/spotify-smart.sh
bind = $mainMod, G, exec, ~/.config/hypr/scripts/chatgpt-smart.sh

# Screenshots
bind = CTRL+SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, S, exec, grim ~/Pictures/screenshot-$(date +%F-%T).png

# Focus movement (vim keys)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Workspaces (1-9, 0->10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Super + drag move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# =========================
# Window rules
# =========================

# General defaults
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1

# --- Workspace 1: Ghostty (dev terminal)
windowrulev2 = workspace 1, class:^(com\.mitchellh\.ghostty)$

# --- Workspace 5: Services
windowrulev2 = workspace 5 silent, class:^(spotify)$
# (Discord later once installed: class usually ^(discord)$ or ^(discordcanary)$)

# --- Workspace 4: ChatGPT in Firefox (title match)
# If you find this doesn't catch reliably, we’ll tighten it after we see actual titles.
windowrulev2 = workspace 4 silent, class:^(firefox)$, title:.*(ChatGPT|OpenAI).*

# --- Steam client (services workspace)
windowrulev2 = workspace 5, class:^(steam)$

# --- Steam games (games-only workspace)
windowrulev2 = workspace 3, class:^(steam_app_.*)$

#
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}
