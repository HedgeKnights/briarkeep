[global]
    frame_color = "#8833ff"

[urgency_low]
    background = "#111111"
    foreground = "#666666"
    frame_color = "#333333"
    timeout = 8

[urgency_normal]
    background = "#1a1a1a"
    foreground = "#ffffff"
    frame_color = "#8833ff"
    timeout = 10

[urgency_critical]
    background = "#3d0066"
    foreground = "#ffffff"
    frame_color = "#ff00ff"
    timeout = 0
