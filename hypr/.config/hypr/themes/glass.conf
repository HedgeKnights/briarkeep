# --- Glass Theme  ---

# --- Waybar
blurls = waybar

general {
    gaps_in = 8
    gaps_out = 15
    border_size = 2
    col.active_border = rgba(8833ffee) rgba(ff00ffee) 45deg
    col.inactive_border = rgba(595959aa)
}

decoration {
    rounding = 12
    
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}
