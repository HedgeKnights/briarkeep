[global]
    frame_color = "#cba6f7"

[urgency_low]
    background = "#1e1e2e"
    foreground = "#6c7086"
    frame_color = "#313244"
    timeout = 8

[urgency_normal]
    background = "#1e1e2e"
    foreground = "#cdd6f4"
    frame_color = "#cba6f7"
    timeout = 10

[urgency_critical]
    background = "#f38ba8"
    foreground = "#1e1e2e"
    frame_color = "#f38ba8"
    timeout = 0
