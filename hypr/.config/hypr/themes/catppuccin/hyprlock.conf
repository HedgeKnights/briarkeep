general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.05
    brightness = 0.7
    contrast = 1.0
    vibrancy = 0.1
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(ca9ee6)
    inner_color = rgb(303446)
    font_color = rgb(c6d0f5)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 10
    check_color = rgb(a6d189)
    fail_color = rgb(e78284)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(c6d0f5ff)
    font_size = 72
    font_family = Monospace
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(a5adceff)
    font_size = 20
    font_family = Monospace
    position = 0, 80
    halign = center
    valign = center
}
