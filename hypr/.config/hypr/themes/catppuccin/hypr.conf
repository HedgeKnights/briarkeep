# --- Catppuccin Frappé Theme ---

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(ca9ee6ee) rgba(8caaeeee) 45deg
    col.inactive_border = rgba(414559aa)
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(303446ee)
    }
}

animations {
    enabled = true
    bezier = catppuccin, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 6, catppuccin
    animation = windowsOut, 1, 6, default, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 6, default
    animation = workspaces, 1, 5, default
}
