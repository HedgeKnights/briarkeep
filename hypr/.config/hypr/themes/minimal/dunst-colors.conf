[global]
    frame_color = "#444444"

[urgency_low]
    background = "#0d0d0d"
    foreground = "#555555"
    frame_color = "#222222"
    timeout = 8

[urgency_normal]
    background = "#111111"
    foreground = "#e0e0e0"
    frame_color = "#444444"
    timeout = 10

[urgency_critical]
    background = "#3a0000"
    foreground = "#ffffff"
    frame_color = "#cc0000"
    timeout = 0
