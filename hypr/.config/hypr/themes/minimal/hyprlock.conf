general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.05
    brightness = 0.6
    contrast = 1.0
    vibrancy = 0.0
}

input-field {
    monitor =
    size = 280, 52
    outline_thickness = 1
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(595959)
    inner_color = rgb(111111)
    font_color = rgb(cccccc)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 0
    check_color = rgb(888888)
    fail_color = rgb(cc4444)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color = rgba(ccccccff)
    font_size = 72
    font_family = Monospace
    position = 0, 160
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(888888ff)
    font_size = 20
    font_family = Monospace
    position = 0, 80
    halign = center
    valign = center
}
