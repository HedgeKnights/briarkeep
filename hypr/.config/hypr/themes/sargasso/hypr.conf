# --- Sargasso Sea Theme ---

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(2abcbcee) rgba(c49040ee) 45deg
    col.inactive_border = rgba(1c2840aa)
}

decoration {
    rounding = 10

    blur {
        enabled = true
        size = 7
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(040810ee)
    }
}

animations {
    enabled = true
    bezier = sargasso, 0.02, 0.8, 0.05, 1.0
    animation = windows, 1, 6, sargasso
    animation = windowsOut, 1, 6, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 6, default
    animation = workspaces, 1, 5, sargasso
}
