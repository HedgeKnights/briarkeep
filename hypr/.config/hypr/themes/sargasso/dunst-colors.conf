[global]
    frame_color = "#2abcbc"

[urgency_low]
    background = "#0c1220"
    foreground = "#4a7085"
    frame_color = "#1c2840"
    timeout = 8

[urgency_normal]
    background = "#101828"
    foreground = "#c0d8e8"
    frame_color = "#2abcbc"
    timeout = 10

[urgency_critical]
    background = "#0e2020"
    foreground = "#c0d8e8"
    frame_color = "#c49040"
    timeout = 0
