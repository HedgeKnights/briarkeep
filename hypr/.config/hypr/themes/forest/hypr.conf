# --- Forest Theme ---

general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(7ab648ee) rgba(c8a84bee) 45deg
    col.inactive_border = rgba(2e3d2888)
}

decoration {
    rounding = 8

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(0d1a0bee)
    }
}

animations {
    enabled = true
    bezier = forest, 0.25, 0.46, 0.45, 0.94
    animation = windows, 1, 5, forest
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 8, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default
}
