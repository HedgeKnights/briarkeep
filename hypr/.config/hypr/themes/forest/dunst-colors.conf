[global]
    frame_color = "#7ab648"

[urgency_low]
    background = "#0d1a0b"
    foreground = "#5a7a45"
    frame_color = "#2e3d28"
    timeout = 8

[urgency_normal]
    background = "#0d1a0b"
    foreground = "#d4e8c2"
    frame_color = "#7ab648"
    timeout = 10

[urgency_critical]
    background = "#5c1a1a"
    foreground = "#d4e8c2"
    frame_color = "#c0392b"
    timeout = 0
